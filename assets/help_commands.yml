  desc: Information about the bot and a list of available commands.
  usage: /help
  example: /help
  docs: help

### SET ###
set:
  name: set
  desc: >-
    Set or change your username color. Colors can be given as a HEX value (with or without
    a leading '#'), as a CSS color name, or by copying another user's color (mention the user,
    e.g. @kaaroll99). Use the keyword "random" to pick a random color.

    The command generates a preview image and asks for confirmation before applying the color.

    ### Parameters:
      <color> - Color to set (required).
    ### Accepted color formats:
      - Hex: F5DF4D or #F5DF4D
      - CSS color names: royalblue
      - Other formats supported by the parser (e.g., rgb(...), hsl(...))
    ### Username:
      - Copy color from another user by mentioning them (e.g. @kaaroll99). If the selected user
        does not have a colored role an error will be returned.
    ### Notes:
      - If you don't already have a bot-managed color role, the bot will create one named
        "color-<YOUR_ID>" and assign it to you.
      - To create a two-color gradient, use the `/gradient` command instead.
      - The command is subject to a cooldown.
  usage: /set <color>
  example: |
    - /set f5df4d
    - /set royalblue
    - /set @kaaroll99
    - /set random
  docs: set

### GRADIENT ###
gradient:
  name: gradient
  desc: >-
    Set or change your username color using a two-color gradient. You provide a primary and a
    secondary color, and the bot blends them into a gradient role. Each color can be given as a
    HEX value (with or without a leading '#'), as a CSS color name, by copying another user's
    color (mention the user, e.g. @kaaroll99), or as "random" to pick a random color.

    The command generates a preview image and asks for confirmation before applying the gradient.

    ### Parameters:
      <color> - Primary color of the gradient (required).
      <secondary_color> - Secondary color of the gradient (required).
    ### Accepted color formats:
      - Hex: F5DF4D or #F5DF4D
      - CSS color names: royalblue
      - Other formats supported by the parser (e.g., rgb(...), hsl(...))
    ### Username:
      - Copy a color from another user by mentioning them (e.g. @kaaroll99). If the selected user
        does not have a colored role an error will be returned.
    ### Notes:
      - If you don't already have a bot-managed color role, the bot will create one named
        "color-<YOUR_ID>" and assign it to you.
      - To set a single solid color, use the `/set` command instead.
      - The command is subject to a cooldown.
  usage: /gradient <color> <secondary_color>
  example: |
    - /gradient f5df4d 00ff00
    - /gradient royalblue tomato
    - /gradient random random
  docs: gradient

### REMOVE ###
remove:
  name: remove
  desc: >-
    Remove your username color. The bot will remove/unassign the bot-managed color
    role from your account. This command only affects roles created and managed by the bot.

  usage: /remove
  example: /remove
  docs: remove

### SELECT ###
select:
  name: select
  desc: >-
    Choose one of the static colors configured on your server using a dropdown menu.
    The command generates a preview image showing your username rendered with each
    available color so you can see how it will look before applying it.

    ### Notes:
      - The server must have colors configured (up to 10 positions) using `/setup select`.
    - The command generates a small PNG preview and sends it along with the selection UI.
    - A short cooldown applies to prevent spamming (rate-limited per user per server).

  usage: /select
  example: /select
  docs: select

### CHECK ###
check:
  name: check
  desc: >-
    Get color information and a preview image (HEX, RGB, HSL, CMYK).

    ### Accepted input formats:
      - Hex (with or without `#`): `F5DF4D` or `#F5DF4D`
    - Functional notation: `rgb(...)`, `hsl(...)`
    - CSS color names (e.g. `royalblue`)
    - Mention another user to copy their color (e.g. `@kaaroll99`)
    - `random` to pick a random color
    - `random` to pick a random color

    ### What the command returns:
      - Conversions: HEX, RGB, HSL, CMYK
      - A small PNG preview image (`color_fill.png`) showing the color
      - Up to several similar CSS color names (if available)
    ### Notes:
      - Invalid formats will trigger a helpful error message directing to the docs.
      - A short cooldown is applied per user per server to prevent spam.
  usage: /check <color>
  example: /check \#F5DF4D
  docs: check

### HISTORY ###
history:
  name: history
  desc: >-
    View your color change history on the server. The command displays the last 5 colors
    you have used. It also generates a small PNG preview image showing your username
    rendered with each of those colors (shown as "name (#HEX)" when the color matches a CSS
    color name, otherwise just the HEX).

    ### How to use:
      - Press a numbered button to restore that color.

  usage: /history
  example: /history
  docs: history

### FAVORITES ADD ###
favoritesadd:
  name: favorites add
  desc: >-
    Add a color to your personal favorites list. Favorites are saved to your account and are
    available on every server where HueTweaker is present (up to 10 colors). The color can be
    given as a HEX value (with or without a leading '#'), a CSS color name, by copying another
    user's color (mention them, e.g. @kaaroll99), or as "random".

    ### Parameters:
      <color> - Color to add (required).
    ### Accepted color formats:
      - Hex: F5DF4D or #F5DF4D
      - CSS color names: royalblue
      - Mention a user to copy their color, or "random"
    ### Notes:
      - The stored value is always a normalized HEX, regardless of the input format.
      - Duplicate colors and a full list (10/10) are rejected with a message.
  usage: /favorites add <color>
  example: |
    - /favorites add f5df4d
    - /favorites add royalblue
    - /favorites add random
  docs: favorites-add

### FAVORITES LIST ###
favoriteslist:
  name: favorites list
  desc: >-
    Show your personal favorite colors. The command generates a preview image with your
    nickname rendered in each color (shown as "name (#HEX)" when the color matches a CSS
    color name, otherwise just the HEX).

    ### How to use:
      - Press a numbered button to set that favorite as your color.
      - Use the dropdown to remove a color from your list.
    ### Notes:
      - Favorites are global to your account (the same on every server).
      - Add colors first with `/favorites add`.
  usage: /favorites list
  example: /favorites list
  docs: favorites-list

### VOTE ###
vote:
  name: vote
  desc: >-
    Displays the URL for voting.

  usage: /vote
  example: /vote
  docs: vote

### FORCESET ###
forceset:
  name: forceset
  desc: >-
    Set or change another user's username color. This command is for administrators
    and accepts the same input formats as `/set`: HEX (with or without `#`), CSS color
    names, mention a user to copy their color (e.g. `@kaaroll99`), or `random`. You may
    also provide an optional secondary color to create a gradient.

    ### Parameters:
      <user_name> - Name of the selected user
      <color> - Primary color to set (required).
      [secondary_color] - Secondary color for gradient (optional).
    ### Notes:
      - If the target user doesn't have a bot-managed color role, the bot will create
        one named `color-<USER_ID>` and assign it to the user.
    - Requires administrator privileges to run and the bot must have permission to
      manage roles.
  usage: /force set <user_name> <color>
  example: /force set @kaaroll99 f5df4d
  docs: force-set

### FORCEREMOVE ###
forceremove:
  name: forceremove
  desc: >-
    Remove another user's username color. The bot will remove/unassign the bot-managed
    color role from the selected user and delete that role if it exists. This command
    requires administrator privileges.

    ### Parameters:
    <user_name> - Name of the selected user

  usage: /force remove <user_name>
  example: /force remove @kaaroll99
  docs: force-remove

### FORCEPURGE ###
forcepurge:
  name: forcepurge
  desc: >-
    Delete HueTweaker-created color roles from the server. The command opens a confirmation
    dialog where you can choose to remove:
      - individual user color roles
    - static roles created for `/select` (if configured)
    - all color roles
    - all color roles

    ### Notes:
      - This operation is irreversible once confirmed.
      - Requires administrator privileges.
      - The command targets roles matching the pattern `color-{USER_ID}` (e.g. `color-512674615223517205`).

  usage: /force purge
  example: /force purge
  docs: force-purge

### SETUP TOPROLE ###
toprole:
  name: setup toprole
  desc: >-
    Configure how HueTweaker positions color roles on the server.
    The command supports three modes:
      - `auto` moves color roles as high as the bot can manage.
      - `off` moves color roles to the bottom of the role list.
      - `custom` keeps color roles directly below the selected role.

    The `[role_name]` parameter is only used with `custom`.


    ⚠️ The command can only be executed by a user with administrator privileges.

    ### ⚠️ Important:
      - In `custom`, the chosen role is respected only up to the bot's own hierarchy.
      - If the selected role is higher than the bot can manage, HueTweaker will place the
        color roles as high as possible instead.

    ### What happens when you update the mode:
      - The bot stores the selected mode for the server.
      - Existing roles matching `color-<USER_ID>` are moved immediately to the new target position.

    ### 💡 Roles example:
      - [Admin]
      - [Bot]  <- bot higher role
      - [colors]  <- chosen top role
      - [color-...]

    `<mode>` - One of: `auto`, `custom`, `off`
    `[role_name]` - Role used only with `custom`

  usage: /setup toprole <mode> [role_name]
  example: |
    - /setup toprole auto
    - /setup toprole off
    - /setup toprole custom @colors
  docs: setup-toprole

### SETUP SELECT ###

setupselect:
  name: setup select
  desc: >-
    Configure the static color list for the `/select` command. This opens an interactive
    panel where administrators can create the color list or add/edit entries.

    ### Behavior highlights:
      - The list supports up to 10 positions (stored as `hex_1` .. `hex_10` in the DB).
      - If no colors exist yet you'll see a **Create color list** button; otherwise an **Add/Edit color on list** button is shown.
      - Editing opens a modal with two fields:
          * Color index (1-10) — position in the `/select` menu (validated)
        * Color value — hex (e.g. `F5DF4D` or `#F5DF4D`) or CSS color name (e.g. `royalblue`)
      - Leaving the color value empty clears that entry.
    ### Notes & validation:
      - Index must be an integer between 1 and 10; invalid input will show a warning
        and keep the current list unchanged.
      - Colors are parsed with the same rules as `/set` (hex or CSS names).
      - Only users with administrator privileges can run this command.

  usage: /setup select
  example: /setup select
  docs: setup-select
